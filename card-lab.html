<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLB Showdown Card Lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0f14;
        --ink: #edf3f4;
        --muted: #8da0aa;
        --line: rgba(255, 255, 255, 0.14);
        --green: #21a67a;
        --yellow: #f0c14a;
        --orange: #f28c38;
        --red: #e94c5f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(900px 520px at 18% -10%, rgba(70, 135, 185, 0.24), transparent 70%),
          radial-gradient(900px 520px at 96% 110%, rgba(230, 75, 92, 0.16), transparent 70%),
          var(--bg);
        color: var(--ink);
      }

      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0 48px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 {
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: clamp(30px, 5vw, 58px);
        font-stretch: condensed;
        font-weight: 950;
        letter-spacing: 0.02em;
        line-height: 0.92;
        text-transform: uppercase;
      }

      .lede {
        max-width: 520px;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .lab-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(240px, 1fr));
        gap: 22px;
        align-items: start;
      }

      .variant-shell {
        min-width: 0;
      }

      .variant-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-height: 32px;
        margin-bottom: 10px;
        color: #dce8eb;
        font-size: 12px;
        font-weight: 850;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .variant-title span {
        color: var(--muted);
        font-size: 10px;
        font-weight: 750;
      }

      .card {
        --team: #0b6b53;
        --team-dark: #08382f;
        --frame: #e0b74d;
        position: relative;
        width: 100%;
        max-width: 288px;
        margin: 0 auto;
        overflow: hidden;
        border-radius: 18px;
        color: white;
        box-shadow: 0 22px 40px rgba(0, 0, 0, 0.36);
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background: linear-gradient(115deg, transparent 36%, rgba(255, 255, 255, 0.12) 47%, transparent 58%);
        z-index: 5;
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: grayscale(1) contrast(1.05) brightness(1.08);
        mix-blend-mode: luminosity;
      }

      .mini {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 999px;
        padding: 3px 8px;
        background: rgba(255, 255, 255, 0.07);
        color: #dce8eb;
        font-size: 10px;
        font-weight: 750;
        white-space: nowrap;
      }

      .mini b {
        color: #ffd25f;
        font-weight: 950;
      }

      .chart {
        display: grid;
        gap: 3px;
      }

      .chart-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-radius: 6px;
        padding: 4px 9px;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 13px;
        font-weight: 900;
        letter-spacing: 0.02em;
      }

      .chart-row .range {
        color: rgba(255, 255, 255, 0.78);
        font-variant-numeric: tabular-nums;
      }

      .chart-row.out {
        background: linear-gradient(90deg, #263746, #17232f);
        color: #aebcc5;
      }

      .chart-row.walk {
        background: linear-gradient(90deg, #16825e, #0f5d47);
      }

      .chart-row.single {
        background: linear-gradient(90deg, #e0b23a, #af7d17);
        color: #231a08;
      }

      .chart-row.double {
        background: linear-gradient(90deg, #f08c3b, #bd5c1a);
      }

      .chart-row.triple {
        background: linear-gradient(90deg, #e45d30, #a33a1e);
      }

      .chart-row.homer {
        background: linear-gradient(90deg, #f34d66, #a91530);
        box-shadow: 0 0 12px rgba(243, 77, 102, 0.36);
      }

      .variant-a {
        border: 3px solid var(--frame);
        background: #080c10;
      }

      .variant-a .photo {
        position: relative;
        height: 202px;
        background: linear-gradient(155deg, var(--team), var(--team-dark));
      }

      .variant-a .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(105% 76% at 50% 18%, transparent 45%, rgba(0, 0, 0, 0.48)),
          linear-gradient(to bottom, transparent 54%, rgba(8, 12, 16, 0.96));
      }

      .variant-a .name-block {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 10px;
        z-index: 2;
      }

      .variant-a .tag {
        display: inline-block;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 6px;
        padding: 2px 7px;
        background: rgba(0, 0, 0, 0.42);
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.08em;
      }

      .variant-a h2 {
        margin: 4px 0 0;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 28px;
        font-weight: 950;
        line-height: 0.92;
        text-transform: uppercase;
        text-shadow: 0 3px 8px rgba(0, 0, 0, 0.7);
      }

      .variant-a .pts {
        position: absolute;
        top: 10px;
        right: 10px;
        z-index: 3;
        border-radius: 8px;
        padding: 3px 8px;
        background: linear-gradient(135deg, #ffe395, #db9f32);
        color: #211705;
        font-weight: 950;
        box-shadow: 0 2px 9px rgba(0, 0, 0, 0.38);
      }

      .variant-a .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 9px 10px;
        background: #080c10;
      }

      .variant-a .chart {
        padding: 0 8px 10px;
        background: #080c10;
      }

      .variant-b {
        border: 2px solid rgba(255, 255, 255, 0.16);
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.12), transparent 28%),
          linear-gradient(150deg, var(--team), #111923 62%);
      }

      .variant-b .topline {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 12px 0;
        font-size: 10px;
        font-weight: 900;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .variant-b .photo {
        height: 146px;
        margin: 8px 13px 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(155deg, var(--team), var(--team-dark));
      }

      .variant-b h2 {
        margin: 8px 13px 4px;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 25px;
        font-weight: 950;
        line-height: 0.94;
        text-transform: uppercase;
      }

      .variant-b .stat-stripe {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        padding: 0 13px 9px;
      }

      .variant-b .stat {
        border-radius: 8px;
        padding: 5px 4px;
        background: rgba(0, 0, 0, 0.32);
        text-align: center;
      }

      .variant-b .stat small {
        display: block;
        color: #b5c4ca;
        font-size: 8px;
        font-weight: 800;
        letter-spacing: 0.1em;
      }

      .variant-b .stat b {
        font-size: 16px;
      }

      .variant-b .chart {
        padding: 9px 10px 12px;
        background: rgba(0, 0, 0, 0.22);
      }

      .variant-c {
        padding: 3px;
        background: conic-gradient(from 45deg, #ff5f6d, #ffc371, #28e3c2, #589dff, #bf75ff, #ff5f6d);
      }

      .variant-c .inner {
        overflow: hidden;
        border-radius: 15px;
        background: #0d1118;
      }

      .variant-c .photo {
        position: relative;
        height: 186px;
        background:
          radial-gradient(120px 80px at 72% 30%, rgba(255, 255, 255, 0.14), transparent 70%),
          linear-gradient(145deg, var(--team), var(--team-dark));
      }

      .variant-c .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 46%, rgba(13, 17, 24, 0.96));
      }

      .variant-c .badge-row {
        position: absolute;
        top: 10px;
        left: 10px;
        right: 10px;
        z-index: 2;
        display: flex;
        justify-content: space-between;
      }

      .variant-c .badge {
        border: 1px solid rgba(255, 255, 255, 0.25);
        border-radius: 999px;
        padding: 3px 9px;
        background: rgba(0, 0, 0, 0.36);
        font-size: 10px;
        font-weight: 900;
      }

      .variant-c h2 {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 9px;
        z-index: 2;
        margin: 0;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 30px;
        font-weight: 950;
        line-height: 0.9;
        text-transform: uppercase;
      }

      .variant-c .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        padding: 9px 10px;
      }

      .variant-c .chart {
        padding: 0 9px 11px;
      }

      .variant-d {
        display: grid;
        grid-template-columns: 30px 1fr;
        border: 3px solid var(--frame);
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), transparent 32%),
          linear-gradient(145deg, var(--team), var(--team-dark));
      }

      .variant-d .side {
        grid-row: 1 / 4;
        display: grid;
        place-items: center;
        background: #0b0d11;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 18px;
        font-weight: 950;
        text-transform: uppercase;
        writing-mode: vertical-rl;
        transform: rotate(180deg);
      }

      .variant-d .photo {
        position: relative;
        height: 150px;
        background: linear-gradient(155deg, var(--team), var(--team-dark));
      }

      .variant-d .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 44%, rgba(0, 0, 0, 0.66));
      }

      .variant-d .headline {
        position: absolute;
        left: 10px;
        right: 10px;
        bottom: 8px;
        z-index: 2;
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 8px;
      }

      .variant-d h2 {
        margin: 0;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 21px;
        font-weight: 950;
        line-height: 0.94;
        text-transform: uppercase;
      }

      .variant-d .ob {
        display: grid;
        place-items: center;
        min-width: 40px;
        min-height: 40px;
        border: 2px solid #111;
        border-radius: 50%;
        background: #f6f0dc;
        color: #b51225;
        font-size: 23px;
        font-weight: 950;
      }

      .variant-d .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
        padding: 9px 10px;
        background: rgba(5, 8, 10, 0.7);
      }

      .variant-d .chart {
        padding: 0 9px 10px;
        background: rgba(5, 8, 10, 0.7);
      }

      .compact-chart {
        display: grid;
        gap: 5px;
      }

      .score-chart {
        display: grid;
        gap: 3px;
      }

      .score-ranges,
      .score-results {
        display: grid;
        grid-template-columns: repeat(20, minmax(0, 1fr));
      }

      .score-ranges {
        overflow: hidden;
        border-radius: 6px 6px 0 0;
        background: rgba(255, 255, 255, 0.88);
        color: #1c2228;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 8px;
        font-weight: 950;
        line-height: 15px;
        text-align: center;
      }

      .score-range {
        min-width: 0;
        border-right: 1px solid rgba(25, 30, 34, 0.16);
        font-variant-numeric: tabular-nums;
      }

      .score-range:last-child {
        border-right: 0;
      }

      .score-results {
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-top: 0;
        border-radius: 0 0 6px 6px;
        background: rgba(0, 0, 0, 0.42);
      }

      .score-segment {
        display: grid;
        place-items: center;
        min-width: 0;
        height: 19px;
        border-right: 1px solid rgba(255, 255, 255, 0.18);
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 11px;
        font-weight: 950;
        line-height: 1;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.58);
      }

      .score-segment:last-child {
        border-right: 0;
      }

      .score-segment.is-tiny span {
        display: none;
      }

      .score-segment.out {
        background: #253544;
        color: #c3d0d6;
      }

      .score-segment.walk {
        background: #16825e;
      }

      .score-segment.single {
        background: #d7aa36;
        color: #241a08;
        text-shadow: none;
      }

      .score-segment.double {
        background: #e88334;
      }

      .score-segment.triple {
        background: #d9572d;
      }

      .score-segment.homer {
        background: #e94c5f;
      }

      .score-mins {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 3px;
      }

      .score-min {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 3px;
        border-radius: 5px;
        padding: 3px 5px;
        background: rgba(255, 255, 255, 0.1);
        color: white;
        font-size: 9px;
        font-weight: 900;
      }

      .score-min b {
        font-size: 11px;
      }

      .score-min.walk {
        background: rgba(22, 130, 94, 0.82);
      }

      .score-min.single {
        background: rgba(215, 170, 54, 0.9);
        color: #241a08;
      }

      .score-min.double {
        background: rgba(232, 131, 52, 0.9);
      }

      .score-min.triple {
        background: rgba(217, 87, 45, 0.9);
      }

      .score-min.homer {
        background: rgba(233, 76, 95, 0.92);
      }

      .classic-chart {
        display: grid;
        grid-template-columns: repeat(var(--chart-columns), minmax(0, 1fr));
        overflow: hidden;
        border: 1px solid rgba(12, 16, 19, 0.84);
        border-radius: 3px;
        background: #f4efd8;
        box-shadow:
          0 1px 0 rgba(255, 255, 255, 0.38) inset,
          0 1px 7px rgba(0, 0, 0, 0.2);
      }

      .classic-cell {
        display: grid;
        grid-template-rows: 16px 23px;
        min-width: 0;
        border-right: 1px solid rgba(12, 16, 19, 0.34);
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-weight: 950;
        text-align: center;
      }

      .classic-cell:last-child {
        border-right: 0;
      }

      .classic-range,
      .classic-result {
        display: grid;
        place-items: center;
        min-width: 0;
        overflow: hidden;
        white-space: nowrap;
      }

      .classic-range {
        background: #f8f4df;
        color: #111820;
        font-size: 11px;
        letter-spacing: 0;
        font-variant-numeric: tabular-nums;
      }

      .classic-result {
        color: white;
        font-size: 12px;
        line-height: 1;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.58);
      }

      .classic-cell.out .classic-result {
        background: #253544;
        color: #c3d0d6;
      }

      .classic-cell.walk .classic-result {
        background: #16825e;
      }

      .classic-cell.single .classic-result {
        background: #d7aa36;
        color: #241a08;
        text-shadow: none;
      }

      .classic-cell.double .classic-result {
        background: #e88334;
      }

      .classic-cell.triple .classic-result {
        background: #d9572d;
      }

      .classic-cell.homer .classic-result {
        background: #e94c5f;
      }

      .threshold-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 5px;
      }

      .threshold {
        border-radius: 9px;
        padding: 6px 4px;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      .threshold.out,
      .micro.out {
        background: rgba(37, 53, 68, 0.78);
        color: #b9c8cf;
      }

      .threshold.walk,
      .micro.walk {
        background: rgba(22, 130, 94, 0.78);
      }

      .threshold.single,
      .micro.single {
        background: rgba(215, 170, 54, 0.86);
        color: #241a08;
      }

      .threshold.double,
      .micro.double {
        background: rgba(232, 131, 52, 0.86);
      }

      .threshold.triple,
      .micro.triple {
        background: rgba(217, 87, 45, 0.86);
      }

      .threshold.homer,
      .micro.homer {
        background: rgba(233, 76, 95, 0.9);
      }

      .threshold small {
        display: block;
        color: rgba(255, 255, 255, 0.72);
        font-size: 8px;
        font-weight: 850;
        letter-spacing: 0.08em;
      }

      .threshold.single small {
        color: rgba(36, 26, 8, 0.62);
      }

      .threshold b {
        display: block;
        margin-top: 1px;
        font-size: 16px;
        font-weight: 950;
      }

      .micro-chart {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 4px;
      }

      .micro {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        border-radius: 7px;
        padding: 4px 7px;
        background: rgba(255, 255, 255, 0.08);
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 12px;
        font-weight: 900;
      }

      .micro span:first-child {
        color: rgba(255, 255, 255, 0.7);
        font-variant-numeric: tabular-nums;
      }

      .micro.single span:first-child {
        color: rgba(36, 26, 8, 0.62);
      }

      .band-chart {
        display: flex;
        overflow: hidden;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: rgba(0, 0, 0, 0.36);
      }

      .band {
        display: grid;
        place-items: center;
        min-width: 0;
        height: 34px;
        color: white;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 11px;
        font-weight: 950;
        text-shadow: 0 1px 3px rgba(0, 0, 0, 0.55);
      }

      .band.is-small {
        font-size: 9px;
      }

      .band.is-tiny span {
        display: none;
      }

      .band.out {
        background: #253544;
      }

      .band.walk {
        background: #16825e;
      }

      .band.single {
        background: #d7aa36;
        color: #241a08;
        text-shadow: none;
      }

      .band.double {
        background: #e88334;
      }

      .band.triple {
        background: #d9572d;
      }

      .band.homer {
        background: #e94c5f;
      }

      .variant-e {
        border: 3px solid var(--frame);
        background:
          linear-gradient(155deg, rgba(255, 255, 255, 0.11), transparent 36%),
          linear-gradient(145deg, var(--team), #0a1015 62%);
      }

      .variant-e .photo {
        position: relative;
        height: 188px;
        background: linear-gradient(155deg, var(--team), var(--team-dark));
      }

      .variant-e .photo::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(to bottom, transparent 50%, rgba(7, 10, 14, 0.94));
      }

      .variant-e h2 {
        position: absolute;
        left: 12px;
        right: 12px;
        bottom: 10px;
        z-index: 2;
        margin: 0;
        font-family: "Arial Narrow", "Roboto Condensed", "Helvetica Neue Condensed", sans-serif;
        font-size: 29px;
        font-weight: 950;
        line-height: 0.92;
        text-transform: uppercase;
      }

      .variant-e .summary {
        display: grid;
        gap: 8px;
        padding: 10px;
        background: rgba(0, 0, 0, 0.28);
      }

      .variant-e .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 5px;
      }

      .variant-f {
        border: 2px solid rgba(255, 255, 255, 0.18);
        background: #0b0f14;
      }

      .variant-f .top {
        display: grid;
        grid-template-columns: 112px 1fr;
        min-height: 154px;
      }

      .variant-f .photo {
        background: linear-gradient(155deg, var(--team), var(--team-dark));
      }

      .variant-f .identity {
        display: grid;
        align-content: center;
        gap: 8px;
        padding: 14px 12px;
        background:
          radial-gradient(120px 80px at 85% 20%, rgba(255, 255, 255, 0.12), transparent 72%),
          linear-gradient(145deg, color-mix(in srgb, var(--team), #111923 35%), #0b0f14);
      }

      .variant-f h2 {
        margin: 0;

  <body>
    <main>
      <header>
        <h1>Card Lab</h1>
        <p class="lede">2005 Strip rarity preview using a compact range/result chart strip. This page is just a mockup sandbox; the draft hover cards are untouched.</p>
      </header>
      <section id="lab" class="lab-grid" aria-label="Card design variants"></section>
    </main>
    <script type="module">
      import { generatePlayerPool } from "./src/data/playerGeneration.js?v=20260627-middle-infield-fielding";
      import { formatRange, normalizeResult } from "./src/rules/cards.js";

      const labPool = generatePlayerPool("card-lab", 4, 12);
      const player =
        labPool.find((card) => card.kind === "hitter" && card.chart.some((entry) => normalizeResult(entry.result) === "SO")) ??
        labPool.find((card) => card.kind === "hitter");
      const teamColor = colorFor(player.name);
      const teamDark = shade(teamColor, -42);
      const rootStyle = frameStyleFor(player);
      const rarityPreviewCards = [
        { badge: "A", title: "Rainbow", note: "390+ pt", player: { ...player, points: 410 } },
        { badge: "B", title: "Gold", note: "340-389 pt", player: { ...player, points: 360 } },
        { badge: "C", title: "Silver", note: "285-339 pt", player: { ...player, points: 310 } },
        { badge: "D", title: "Bronze", note: "under 285 pt", player: { ...player, points: 250 } }
      ];
      const lab = document.querySelector("#lab");
      lab.innerHTML = rarityPreviewCards.map((item) => shell(item.badge, item.title, item.note, card2005Strip(item.player))).join("");

      function shell(letter, title, note, card) {
        return `<div class="variant-shell">
          <div class="variant-title">${letter}. ${title}<span>${note}</span></div>
          ${card}
        </div>`;
      }

      function posterCard() {
        return `<article class="card variant-a" style="${rootStyle}">
          <div class="photo">
            ${image()}
            <div class="pts">${player.points}<small> PT</small></div>
            <div class="name-block">
              <span class="tag">${player.position}${signed(player.fielding)} / SPD ${player.speed}</span>
              <h2>${escapeHtml(player.name)}</h2>
            </div>
          </div>
          <div class="chips">
            <span class="mini">OB <b>${player.onBase}</b></span>
            <span class="mini">BATS <b>${player.bats}</b></span>
          </div>
          ${chartHtml()}
        </article>`;
      }

      function neonCard() {
        return `<article class="card variant-b" style="${rootStyle}">
          <div class="topline"><span>Showdown</span><span>${player.points} pt</span></div>
          <div class="photo">${image()}</div>
          <h2>${escapeHtml(player.name)}</h2>
          <div class="stat-stripe">
            ${stat("OB", player.onBase)}
            ${stat("POS", player.position)}
            ${stat("FLD", signed(player.fielding))}
            ${stat("SPD", player.speed)}
          </div>
          ${chartHtml()}
        </article>`;
      }

      function foilCard() {
        return `<article class="card variant-c" style="${rootStyle}">
          <div class="inner">
            <div class="photo">
              ${image()}
              <div class="badge-row">
                <span class="badge">OB ${player.onBase}</span>
                <span class="badge">${player.points} pt</span>
              </div>
              <h2>${escapeHtml(player.name)}</h2>
            </div>
            <div class="chips">
              <span class="mini">${player.position}${signed(player.fielding)}</span>
              <span class="mini">SPD <b>${player.speed}</b></span>
              <span class="mini">BATS <b>${player.bats}</b></span>
            </div>
            ${chartHtml()}
          </div>
        </article>`;
      }

      function remixCard() {
        return `<article class="card variant-d" style="${rootStyle}">
          <div class="side">${escapeHtml(player.name)}</div>
          <div class="photo">
            ${image()}
            <div class="headline">
              <h2>${escapeHtml(player.name)}</h2>
              <div class="ob">${player.onBase}</div>
            </div>
          </div>
          <div class="chips">
            <span class="mini">${player.position}${signed(player.fielding)}</span>
            <span class="mini">SPD <b>${player.speed}</b></span>
            <span class="mini">${player.points} pt</span>
          </div>
          ${chartHtml()}
        </article>`;
      }

      function card2005Strip(cardPlayer = player) {
        const rarity = cardRarity(cardPlayer);
        return `<article class="card variant-e rarity-${rarity.key}" style="${frameStyleFor(cardPlayer, rarity)}">
          <div class="photo">
            ${image(cardPlayer)}
            <div class="card-logo"><span>MLB Showdown</span></div>
          </div>
          <div class="lower-panel">
            <div class="player-strip">
              <div class="ob-square">${cardPlayer.onBase}</div>
              <div class="strip-text">
                <h3>${escapeHtml(cardPlayer.name)}</h3>
                <div class="strip-meta">
                  <span>${cardPlayer.points} pt</span>
                  <span>SPD ${cardPlayer.speed}</span>
                  <span>${cardPlayer.position}${signed(cardPlayer.fielding)}</span>
                  <span>BATS ${cardPlayer.bats}</span>
                </div>
              </div>
              <div class="team-mark">${cardPlayer.bats}</div>
            </div>
            ${horizontalScoreChart(cardPlayer)}
          </div>
        </article>`;
      }

      function foilBottomCard() {
        return `<article class="card variant-f" style="${rootStyle}">
          <div class="photo">
            ${image()}
            <div class="card-logo"><span>Showdown</span><span>${player.points} pt</span></div>
            <div class="name-over">
              <h2>${escapeHtml(player.name)}</h2>
              <div class="ob-round">${player.onBase}</div>
            </div>
          </div>
          <div class="lower-panel">
            <div class="strip-meta">
              <span>${player.position}${signed(player.fielding)}</span>
              <span>SPD ${player.speed}</span>
              <span>BATS ${player.bats}</span>
              <span>${player.points} pt</span>
            </div>
            ${horizontalScoreChart()}
          </div>
        </article>`;
      }

      function creamSlabCard() {
        return `<article class="card variant-g" style="${rootStyle}">
          <div class="photo">
            ${image()}
          </div>
          <div class="lower-panel">
            <div class="player-strip">
              <div class="ob-square">${player.onBase}</div>
              <div class="strip-text">
                <h3>${escapeHtml(player.name)}</h3>
                <div class="strip-meta">
                  <span>${player.points} pt</span>
                  <span>SPD ${player.speed}</span>
                  <span>${player.position}${signed(player.fielding)}</span>
                </div>
              </div>
              <div class="team-mark">${player.bats}</div>
            </div>
            ${horizontalScoreChart()}
          </div>
        </article>`;
      }

      function sideBarRailCard() {
        return `<article class="card variant-h" style="${rootStyle}">
          <div class="side-name">${escapeHtml(player.name)}</div>
          <div class="photo">
            ${image()}
            <div class="card-logo"><span>MLB Showdown</span><span>${player.points} pt</span></div>
            <div class="player-strip">
              <div class="ob-round">${player.onBase}</div>
              <div class="strip-text">
                <div class="strip-meta">
                  <span>${player.position}${signed(player.fielding)}</span>
                  <span>SPD ${player.speed}</span>
                  <span>BATS ${player.bats}</span>
                </div>
              </div>
            </div>
          </div>
          <div class="lower-panel">
            ${horizontalScoreChart()}
          </div>
        </article>`;
      }

      function stat(label, value) {
        return `<div class="stat"><small>${label}</small><b>${value}</b></div>`;
      }

      function image(cardPlayer = player) {
        const seed = encodeURIComponent(`${cardPlayer.name}-${cardPlayer.kind}-${cardPlayer.position}`);
        return `<img alt="" src="https://api.dicebear.com/9.x/adventurer/svg?seed=${seed}&backgroundColor=transparent" />`;
      }

      function chartHtml() {
        const rows = compactChartEntries()
          .map((entry) => {
            const result = entry.result;
            return `<div class="chart-row ${resultClass(result)}">
              <span class="range">${formatRange(entry)}</span>
              <span>${result}</span>
            </div>`;
          })
          .join("");
        return `<div class="chart">${rows}</div>`;
      }

      function horizontalScoreChart(cardPlayer = player) {
        const entries = compactChartEntries(cardPlayer);
        const cells = entries
          .map((entry) => {
            return `<div class="classic-cell ${resultClass(entry.result)}" title="${formatRange(entry)} ${entry.result}">
              <span class="classic-range">${formatRange(entry)}</span>
              <span class="classic-result">${entry.result}</span>
            </div>`;
          })
          .join("");
        return `<div class="classic-chart" style="--chart-columns:${entries.length}">${cells}</div>`;
      }

      function scoreMins() {
        const values = outcomeMinimums();
        const outcomes = ["BB", "1B", "2B", "3B", "HR"];
        return `<div class="score-mins">
          ${outcomes.map((outcome) => `<div class="score-min ${resultClass(outcome)}"><span>${outcome}</span><b>${values.get(outcome) ?? ""}</b></div>`).join("")}
        </div>`;
      }

      function thresholdGrid() {
        const values = outcomeMinimums();
        const outcomes = ["BB", "1B", "2B", "3B", "HR"];
        const cells = outcomes
          .map((outcome) => `<div class="threshold ${resultClass(outcome)}">
            <small>${outcome}</small>
            <b>${values.get(outcome) ?? "&nbsp;"}</b>
          </div>`)
          .join("");
        return `<div class="threshold-grid">${cells}</div>`;
      }

      function microChart() {
        const cells = compactChartEntries()
          .map((entry) => `<div class="micro ${resultClass(entry.result)}">
            <span>${formatRange(entry)}</span>
            <b>${entry.result}</b>
          </div>`)
          .join("");
        return `<div class="micro-chart">${cells}</div>`;
      }

      function bandChart() {
        const bands = compactChartEntries()
          .map((entry) => {
            const span = entry.to - entry.from + 1;
            const sizeClass = span === 1 ? "is-tiny" : span === 2 ? "is-small" : "";
            return `<div class="band ${resultClass(entry.result)} ${sizeClass}" style="flex:${span} 1 0" title="${formatRange(entry)} ${entry.result}">
              <span>${entry.result}</span>
            </div>`;
          })
          .join("");
        return `<div class="band-chart">${bands}</div>`;
      }

      function outcomeMinimums() {
        const values = new Map();
        for (const entry of compactChartEntries()) {
          if (!values.has(entry.result)) values.set(entry.result, entry.from);
        }
        return values;
      }

      function compactChartEntries(cardPlayer = player) {
        const entries = [...cardPlayer.chart]
          .map((entry) => ({ ...entry, result: normalizeResult(entry.result) }))
          .sort((a, b) => a.from - b.from);
        return entries.reduce((merged, entry) => {
          const last = merged.at(-1);
          if (last && last.result === entry.result && last.to + 1 === entry.from) {
            last.to = entry.to;
          } else {
            merged.push({ ...entry });
          }
          return merged;
        }, []);
      }

      function resultClass(result) {
        if (["SO", "GB", "FB", "PU"].includes(result)) return "out";
        if (result === "BB") return "walk";
        if (result === "1B") return "single";
        if (result === "2B") return "double";
        if (result === "3B") return "triple";
        if (result === "HR") return "homer";
        return "out";
      }

      function signed(value) {
        return Number(value) > 0 ? `+${value}` : String(value);
      }

      function cardRarity(cardPlayer) {
        if (cardPlayer.points >= 390) return { key: "rainbow", frame: "conic-gradient(from 40deg, #ff6279, #ffd15e, #53d69e, #4f9dff, #c27cff, #ff6279)" };
        if (cardPlayer.points >= 340) return { key: "gold", frame: "#e1b64b" };
        if (cardPlayer.points >= 285) return { key: "silver", frame: "#c9d2d8" };
        return { key: "bronze", frame: "#9c6a3f" };
      }

      function frameStyleFor(cardPlayer, rarity = cardRarity(cardPlayer)) {
        const color = colorFor(cardPlayer.name);
        return `--team:${color};--team-dark:${shade(color, -42)};--frame:${rarity.frame}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function colorFor(seed) {
        const colors = ["#0b6b53", "#365f91", "#8a4c22", "#8f3147", "#4f6f2b", "#5a4f91"];
        let total = 0;
        for (let i = 0; i < seed.length; i += 1) total += seed.charCodeAt(i);
        return colors[total % colors.length];
      }

      function shade(hex, amount) {
        const value = hex.replace("#", "");
        const channels = [0, 2, 4].map((index) => Math.max(0, Math.min(255, parseInt(value.slice(index, index + 2), 16) + amount)));
        return `#${channels.map((channel) => channel.toString(16).padStart(2, "0")).join("")}`;
      }
    </script>
