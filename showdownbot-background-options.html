<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fictional Card Backgrounds</title>
  <link rel="stylesheet" href="./src/ui/cardFace.css">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      padding: 28px;
      background: #17191d;
      color: #f5f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }
    main {
      width: min(1420px, 100%);
      margin: 0 auto;
    }
    h1 {
      margin: 0 0 20px;
      font-size: 16px;
      font-weight: 700;
      text-transform: uppercase;
    }
    .background-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 18px;
    }
    .sample {
      min-width: 0;
    }
    .sample h2 {
      margin: 0 0 8px;
      color: #c8ced7;
      font-size: 12px;
      font-weight: 700;
      text-align: center;
      text-transform: uppercase;
    }
    .sample .gq-card {
      width: 100%;
      margin: 0;
    }
    @media (max-width: 980px) {
      .background-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    }
    @media (max-width: 540px) {
      body { padding: 16px; }
      .background-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <main>
    <h1>Fictional player backgrounds</h1>
    <div class="background-grid" id="background-grid"></div>
  </main>
  <script type="module">
    import { buildFictionalUniverse } from "./src/data/playerGeneration.js";
    import { cardPanelHtml } from "./src/ui/cardFace.js";

    const order = ["day", "sunset", "night", "ivy", "brick", "dome"];
    const examples = new Map();

    for (const card of buildFictionalUniverse()) {
      const html = cardPanelHtml({ ...card, rarity: "common" });
      const variant = /gq-backdrop-([a-z]+)/.exec(html)?.[1];
      if (variant && !examples.has(variant)) examples.set(variant, { card, html });
      if (examples.size === order.length) break;
    }

    document.querySelector("#background-grid").innerHTML = order.map((variant) => {
      const example = examples.get(variant);
      return `<section class="sample"><h2>${variant}</h2>${example?.html ?? ""}</section>`;
    }).join("");
  </script>
</body>
</html>
