<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<!-- Deep links land here. This branch holds two files, so every old bookmark —
     /adventure.html, /card-lab.html — is a miss, and Pages serves this page for
     all of them. That makes 404.html the redirector that actually matters: it
     forwards the path instead of dumping everyone on the front page.

     The repo name is a path prefix on a project site (skyshib.github.io/<repo>/…)
     but not on a custom domain, so it is stripped only when it is really there.
     No <meta refresh> here — the destination depends on the path, so the redirect
     has to be computed, and a refresh tag would race it to the wrong URL. -->
<title>Moved — MLB Showdown</title>
<meta name="robots" content="noindex, follow" />
<script>
  var HOME = "https://mlb-showdown-mvp.fly.dev";
  var path = location.pathname.replace(/^\/mlb-showdown-mvp(?=\/|$)/, "");
  location.replace(HOME + (path || "/") + location.search + location.hash);
</script>
<style>
  body {
    margin: 0; min-height: 100vh; display: grid; place-content: center; gap: 8px;
    text-align: center; background: #0d0d0d; color: #fff;
    font: 15px/1.6 system-ui, -apple-system, "Segoe UI", sans-serif;
  }
  a { color: #3987e5; }
</style>
</head>
<body>
  <p>MLB Showdown has moved.</p>
  <p><a href="https://mlb-showdown-mvp.fly.dev/">mlb-showdown-mvp.fly.dev</a></p>
</body>
</html>
