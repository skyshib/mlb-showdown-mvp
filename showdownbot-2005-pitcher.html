<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowdownBot Pitcher Card Prototype</title>
  <style>
    @font-face {
      font-family: "Showdown Condensed";
      src: url("./vendor/showdownbot/HelveticaNeueCondensedBold.ttf") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px 16px 36px;
      background: #17191d;
      color: #f5f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    .lab {
      width: min(460px, 100%);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .lab-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #aeb5c0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .lab-header img {
      width: 72px;
      height: auto;
    }

    .rarity-picker {
      width: min(430px, 94vw);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
    }

    .rarity-choice {
      --choice-color: #cbd0d8;
      min-width: 0;
      height: 38px;
      display: grid;
      place-items: center;
      padding: 0 4px;
      border: 1px solid #3c414a;
      border-radius: 6px;
      background: #22252a;
      color: var(--choice-color);
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: 11px;
      font-style: italic;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      cursor: pointer;
    }

    .rarity-choice[data-rarity="common"] { --choice-color: #cbd0d8; }
    .rarity-choice[data-rarity="bronze"] { --choice-color: #c9915d; }
    .rarity-choice[data-rarity="silver"] { --choice-color: #e5edf2; }
    .rarity-choice[data-rarity="gold"] { --choice-color: #f0c95e; }
    .rarity-choice[data-rarity="legendary"] { --choice-color: #c27cff; }

    .rarity-choice[data-rarity="legendary"] span,
    .rarity-mark.rarity-legendary {
      background: linear-gradient(90deg, #ff6279, #ffd15e, #53d69e, #4f9dff, #c27cff, #ff6279);
      background-clip: text;
      color: transparent;
      -webkit-background-clip: text;
    }

    .rarity-mark.rarity-legendary {
      filter: drop-shadow(0 1px 1px #000) drop-shadow(0 0 1px rgba(0, 0, 0, 0.9));
      text-shadow: none;
    }

    .rarity-choice:hover {
      border-color: #6e7682;
      filter: brightness(1.12);
    }

    .rarity-choice[aria-pressed="true"] {
      border-color: var(--choice-color);
      background: #30343b;
      box-shadow: 0 0 0 1px color-mix(in srgb, var(--choice-color) 35%, transparent);
    }

    .rarity-frame {
      --rarity-color: #9c6a3f;
      --rarity-glow: rgba(156, 106, 63, 0.32);
      width: min(430px, 94vw);
      padding: 6px;
      border-radius: 15px;
      background: var(--rarity-color);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.55),
        0 0 22px var(--rarity-glow);
    }

    .rarity-frame.rarity-silver {
      --rarity-color: #c9d2d8;
      --rarity-glow: rgba(152, 186, 205, 0.36);
    }

    .rarity-frame.rarity-common {
      --rarity-color: #68727d;
      --rarity-glow: rgba(104, 114, 125, 0.2);
    }

    .rarity-frame.rarity-bronze {
      --rarity-color: #9c6a3f;
      --rarity-glow: rgba(156, 106, 63, 0.32);
    }

    .rarity-frame.rarity-gold {
      --rarity-color: #e1b64b;
      --rarity-glow: rgba(221, 173, 57, 0.42);
    }

    .rarity-frame.rarity-rainbow,
    .rarity-frame.rarity-legendary {
      --rarity-color: conic-gradient(from 40deg, #ff6279, #ffd15e, #53d69e, #4f9dff, #c27cff, #ff6279);
      --rarity-glow: rgba(120, 180, 255, 0.52);
    }

    .rarity-mark {
      position: absolute;
      z-index: 8;
      top: 2.5%;
      right: calc(3.1% - 2px);
      padding-right: 2px;
      color: #cbd0d8;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(13px, 3.4vw, 19px);
      font-style: italic;
      font-weight: 700;
      line-height: 1;
      text-transform: uppercase;
      text-shadow:
        -1px -1px 0 rgba(0, 0, 0, 0.9),
        1px -1px 0 rgba(0, 0, 0, 0.9),
        -1px 1px 0 rgba(0, 0, 0, 0.9),
        1px 1px 0 rgba(0, 0, 0, 0.9),
        0 2px 5px rgba(0, 0, 0, 0.72);
    }

    .rarity-mark.rarity-common { color: #cbd0d8; }
    .rarity-mark.rarity-bronze { color: #c9915d; }
    .rarity-mark.rarity-silver { color: #e5edf2; }
    .rarity-mark.rarity-gold { color: #f0c95e; }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1500 / 2100;
      overflow: hidden;
      background: #dfe4e8;
      border-radius: 9px;
      isolation: isolate;
      --pu-color: #735394;
      --so-color: #a93443;
      --gb-color: #34785d;
      --fb-color: #286f9b;
    }

    .photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, #8099ae 0 58%, #193725 58% 64%, #49734d 64% 100%);
      filter: saturate(0.94) contrast(1.04);
    }

    .photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center bottom;
      transform: translateY(-20px) scale(1.08);
      transform-origin: center bottom;
    }

    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, 0.12) 78%, rgba(0, 0, 0, 0.42) 100%);
      pointer-events: none;
    }

    .frame {
      position: absolute;
      z-index: 3;
      left: -4.8%;
      top: -3.43%;
      width: 109.6%;
      height: 106.86%;
      object-fit: fill;
      pointer-events: none;
    }

    .primary-ribbon {
      position: absolute;
      z-index: 8;
      left: 3.2%;
      top: 89.3%;
      width: 13.8%;
      height: 3.25%;
      overflow: visible;
      pointer-events: none;
    }

    .primary-ribbon path {
      fill: #091018;
      stroke: #ef3d1b;
      stroke-width: 4px;
      stroke-linejoin: round;
    }

    .primary-number {
      position: absolute;
      z-index: 7;
      left: 10.23%;
      top: 86.38%;
      width: 11.5%;
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .ball-fill {
      fill: #f5eedf;
      stroke: #c8bda8;
      stroke-width: 2;
    }

    .ball-seam {
      fill: none;
      stroke: #c84b43;
      stroke-width: 3;
      stroke-linecap: round;
    }

    .ball-stitches {
      fill: none;
      stroke: #c84b43;
      stroke-width: 2.4;
      stroke-linecap: round;
    }

    .primary-value {
      position: absolute;
      z-index: 10;
      left: 10.23%;
      top: 86.38%;
      color: #ef3d1b;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(21px, 6.5vw, 29px);
      font-style: normal;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      text-shadow:
        -1px -1px 0 #080808,
        1px -1px 0 #080808,
        -1px 1px 0 #080808,
        1px 1px 0 #080808;
      pointer-events: none;
    }

    .primary-label {
      position: absolute;
      z-index: 11;
      left: 3.2%;
      top: 89.3%;
      width: 13.8%;
      height: 3.25%;
      overflow: visible;
      pointer-events: none;
    }

    .primary-label .ribbon-curve {
      fill: none;
    }

    .primary-label text {
      fill: #fff;
      stroke: #080808;
      stroke-width: 1.4px;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: 32px;
      font-weight: 700;
      paint-order: stroke fill;
      text-anchor: middle;
    }

    .player-name {
      position: absolute;
      z-index: 6;
      left: 18.4%;
      top: 84.57%;
      width: 76%;
      height: 5%;
      display: flex;
      align-items: center;
      overflow: hidden;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(20px, 5.4vw, 31px);
      font-style: normal;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.88);
    }

    .metadata {
      position: absolute;
      z-index: 6;
      left: 18.8%;
      right: 17.4%;
      top: 90.43%;
      height: 3.1%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.55vw, 14px);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 2px #000;
      transform: translateY(-10%);
    }

    .chart-strip {
      position: absolute;
      z-index: 6;
      left: 0;
      right: 0;
      top: 93.35%;
      height: 6.65%;
      display: grid;
      grid-template-rows: 3.55fr 3.1fr;
      background: rgb(9, 41, 64);
      border-top: 1px solid rgba(0, 0, 0, 0.72);
      border-bottom: 1px solid rgba(0, 0, 0, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    }

    .chart-ranges,
    .chart-outcomes {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      align-items: center;
      padding: 0 2.45%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-style: normal;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 2px #000;
    }

    .chart-ranges {
      font-size: clamp(10px, 2.7vw, 15px);
      transform: translateY(-1px);
    }

    .chart-outcomes {
      border-top: 1px solid rgba(0, 0, 0, 0.7);
      font-size: clamp(11px, 2.9vw, 16px);
    }

    .chart-ranges span,
    .chart-outcomes span {
      height: 100%;
      display: grid;
      place-items: center;
    }

    .chart-ranges span:nth-child(1),
    .chart-outcomes span:nth-child(1) { background: color-mix(in srgb, var(--pu-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(2),
    .chart-outcomes span:nth-child(2) { background: color-mix(in srgb, var(--so-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(3),
    .chart-outcomes span:nth-child(3) { background: color-mix(in srgb, var(--gb-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(4),
    .chart-outcomes span:nth-child(4) { background: color-mix(in srgb, var(--fb-color) 82%, rgb(9, 41, 64)); }

    .note {
      margin: 0;
      color: #aeb5c0;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 460px) {
      .rarity-choice {
        padding: 0 2px;
        font-size: 9px;
      }
    }

    @media (max-width: 380px) {
      .player-name {
        font-size: 21px;
      }

      .metadata {
        font-size: 9px;
      }

      .chart-ranges {
        font-size: 9px;
      }

      .chart-outcomes {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="lab">
    <header class="lab-header">
      <span>Fictional pitcher test</span>
    </header>

    <div class="rarity-picker" aria-label="Preview rarity">
      <button class="rarity-choice" type="button" data-rarity="common" aria-pressed="false">
        <span>Common</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="bronze" aria-pressed="false">
        <span>Bronze</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="silver" aria-pressed="true">
        <span>Silver</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="gold" aria-pressed="false">
        <span>Gold</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="legendary" aria-pressed="false">
        <span>Legendary</span>
      </button>
    </div>

    <div class="rarity-frame rarity-silver" aria-label="Silver rarity">
    <article class="card" aria-label="Asami Ortega Showdown-style pitcher card">
      <span class="rarity-mark rarity-silver" aria-label="Silver rarity" title="Silver">Silver</span>
      <div class="photo">
        <img
          src="https://api.dicebear.com/9.x/micah/svg?seed=Asami%20Ortega-pitcher-SP&amp;backgroundColor=transparent"
          alt="Fictional portrait of Asami Ortega"
          referrerpolicy="no-referrer"
        >
      </div>

      <img class="frame" src="./vendor/showdownbot/2004-Pitcher-BLUE-NO-FOOTER-NO-RIBBON.png" alt="">
      <svg class="primary-number" viewBox="0 0 100 100" aria-hidden="true">
        <circle class="ball-fill" cx="50" cy="50" r="48"></circle>
        <path class="ball-seam" d="M 18 7 C 42 22 42 78 18 93"></path>
        <path class="ball-seam" d="M 82 7 C 58 22 58 78 82 93"></path>
        <path class="ball-stitches" d="M 23 20 L 33 12 M 29 32 L 39 26 M 31 44 L 43 42 M 31 56 L 43 58 M 29 68 L 39 74 M 23 80 L 33 88"></path>
        <path class="ball-stitches" d="M 67 12 L 77 20 M 61 26 L 71 32 M 57 42 L 69 44 M 57 58 L 69 56 M 61 74 L 71 68 M 67 88 L 77 80"></path>
      </svg>
      <svg class="primary-ribbon" viewBox="0 0 200 70" aria-hidden="true">
        <path d="M 8 30 Q 100 7 192 30 L 181 64 Q 100 42 19 64 Z"></path>
      </svg>
      <div class="primary-value">6</div>
      <svg class="primary-label" viewBox="0 0 200 70" role="img" aria-label="Control">
        <path class="ribbon-curve" id="control-ribbon-curve" d="M 15 52 Q 100 29 185 52"></path>
        <text><textPath href="#control-ribbon-curve" startOffset="50%">CONTROL</textPath></text>
      </svg>

      <div class="player-name">Asami Ortega</div>

      <div class="metadata" aria-label="Player metadata">
        <span>323 PT</span>
        <span>Starter</span>
        <span>IP 6</span>
        <span>Throws L</span>
      </div>

      <div class="chart-strip" aria-label="Pitching chart">
        <div class="chart-ranges" aria-label="Chart result ranges">
          <span>1</span>
          <span>2-5</span>
          <span>6-11</span>
          <span>12-14</span>
          <span>15-17</span>
          <span>18</span>
          <span>19</span>
          <span>20</span>
        </div>
        <div class="chart-outcomes" aria-label="Chart outcomes">
          <span>PU</span>
          <span>SO</span>
          <span>GB</span>
          <span>FB</span>
          <span>BB</span>
          <span>1B</span>
          <span>2B</span>
          <span>HR</span>
        </div>
      </div>
    </article>
    </div>

    <p class="note">
      Fictional pitcher using DiceBear's Micah portrait style.
    </p>
  </main>
  <script>
    const rarityTiers = ["common", "bronze", "silver", "gold", "legendary"];
    const rarityFrame = document.querySelector(".rarity-frame");
    const rarityMark = document.querySelector(".rarity-mark");
    const rarityChoices = document.querySelectorAll(".rarity-choice");

    function previewRarity(tier) {
      const rarityClasses = rarityTiers.map((name) => `rarity-${name}`);
      rarityFrame.classList.remove(...rarityClasses);
      rarityMark.classList.remove(...rarityClasses);
      rarityFrame.classList.add(`rarity-${tier}`);
      rarityMark.classList.add(`rarity-${tier}`);

      const label = tier[0].toUpperCase() + tier.slice(1);
      rarityFrame.setAttribute("aria-label", `${label} rarity`);
      rarityMark.setAttribute("aria-label", `${label} rarity`);
      rarityMark.title = label;
      rarityMark.textContent = label;
      rarityChoices.forEach((choice) => {
        choice.setAttribute("aria-pressed", String(choice.dataset.rarity === tier));
      });
    }

    rarityChoices.forEach((choice) => {
      choice.addEventListener("click", () => previewRarity(choice.dataset.rarity));
    });
  </script>
</body>
</html>
