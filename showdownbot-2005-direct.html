<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowdownBot 2005 Card Prototype</title>
  <style>
    @font-face {
      font-family: "Showdown Condensed";
      src: url("./vendor/showdownbot/HelveticaNeueCondensedBold.ttf") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px 16px 36px;
      background: #17191d;
      color: #f5f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    .lab {
      width: min(460px, 100%);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .lab-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #aeb5c0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .lab-header img {
      width: 72px;
      height: auto;
    }

    .card {
      position: relative;
      width: min(430px, 94vw);
      aspect-ratio: 1500 / 2100;
      overflow: hidden;
      background: #dfe4e8;
      border-radius: 9px;
      box-shadow: 0 24px 54px rgba(0, 0, 0, 0.55);
      isolation: isolate;
    }

    .photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, 0.16) 78%, rgba(0, 0, 0, 0.48) 100%),
        url("./assets/cards/foil-330-hank-blalock-mlb-2005-base-set.jpg") center 12% / cover no-repeat;
      filter: saturate(0.94) contrast(1.04);
    }

    .frame {
      position: absolute;
      z-index: 3;
      left: -4.8%;
      top: -3.43%;
      width: 109.6%;
      height: 106.86%;
      object-fit: fill;
      pointer-events: none;
    }

    .onbase-number {
      position: absolute;
      z-index: 6;
      left: 10.23%;
      top: 77.38%;
      color: #ef3d1b;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(21px, 6.5vw, 29px);
      font-style: normal;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      text-shadow:
        -1px -1px 0 #080808,
        1px -1px 0 #080808,
        -1px 1px 0 #080808,
        1px 1px 0 #080808;
      pointer-events: none;
    }

    .team-logo {
      position: absolute;
      z-index: 5;
      left: 79.33%;
      top: 70.48%;
      width: 13.33%;
      height: 9.52%;
      object-fit: contain;
      filter: drop-shadow(0 2px 1px rgba(0, 0, 0, 0.7));
    }

    .player-name {
      position: absolute;
      z-index: 6;
      left: 18.4%;
      top: 75.57%;
      width: 59.33%;
      height: 5%;
      display: flex;
      align-items: center;
      overflow: hidden;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(20px, 5.4vw, 31px);
      font-style: normal;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.88);
    }

    .metadata {
      position: absolute;
      z-index: 6;
      left: 18.8%;
      right: 17.4%;
      top: 81.43%;
      height: 3.1%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.55vw, 14px);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 2px #000;
      transform: translateY(-10%);
    }

    .chart-strip {
      position: absolute;
      z-index: 6;
      left: 0;
      right: 0;
      top: 84.35%;
      height: 6.65%;
      display: grid;
      grid-template-rows: 3.55fr 3.1fr;
      background: rgb(9, 41, 64);
      border-top: 1px solid rgba(0, 0, 0, 0.72);
      border-bottom: 1px solid rgba(0, 0, 0, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    }

    .chart-ranges,
    .chart-outcomes {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      align-items: center;
      padding: 0 2.45%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-style: normal;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 2px #000;
    }

    .chart-ranges {
      font-size: clamp(10px, 2.7vw, 15px);
      transform: translateY(-1px);
    }

    .chart-outcomes {
      border-top: 1px solid rgba(0, 0, 0, 0.7);
      font-size: clamp(11px, 2.9vw, 16px);
    }

    .set-year {
      position: absolute;
      z-index: 6;
      right: 4.1%;
      top: 91.05%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.45vw, 14px);
      line-height: 1;
      text-shadow: 0 2px 2px #000;
    }

    .note {
      margin: 0;
      color: #aeb5c0;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 380px) {
      .player-name {
        font-size: 21px;
      }

      .metadata {
        font-size: 9px;
      }

      .chart-ranges {
        font-size: 9px;
      }

      .chart-outcomes {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="lab">
    <header class="lab-header">
      <span>2005 renderer prototype</span>
      <img src="./vendor/showdownbot/set-2005-v2.png" alt="2005">
    </header>

    <article class="card" aria-label="Hank Blalock 2005 Showdown-style card">
      <div class="photo"></div>

      <img class="frame" src="./vendor/showdownbot/2004-Hitter-BLUE.png" alt="">
      <div class="onbase-number">9</div>
      <img class="team-logo" src="./vendor/showdownbot/TEX.png" alt="Texas Rangers">

      <div class="player-name">Hank Blalock</div>

      <div class="metadata" aria-label="Player metadata">
        <span>285 PT</span>
        <span>Speed 11</span>
        <span>Bats L</span>
        <span>3B +1</span>
      </div>

      <div class="chart-strip" aria-label="Batting chart">
        <div class="chart-ranges" aria-label="Chart result ranges">
          <span>1-3</span>
          <span>4-5</span>
          <span>6</span>
          <span>7-9</span>
          <span>10-16</span>
          <span>17-18</span>
          <span>-</span>
          <span>19+</span>
        </div>
        <div class="chart-outcomes" aria-label="Chart outcomes">
          <span>SO</span>
          <span>GB</span>
          <span>FB</span>
          <span>BB</span>
          <span>1B</span>
          <span>2B</span>
          <span>3B</span>
          <span>HR</span>
        </div>
      </div>

      <div class="set-year">2005</div>
    </article>

    <p class="note">
      This version uses ShowdownBot's actual 2004/2005 frame, fonts, logo, and renderer coordinates. The player photo is still the existing unprocessed mockup image.
    </p>
  </main>
</body>
</html>
