<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowdownBot 2005 Card Prototype</title>
  <style>
    @font-face {
      font-family: "Showdown Condensed";
      src: url("./vendor/showdownbot/HelveticaNeueCondensedBold.ttf") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px 16px 36px;
      background: #17191d;
      color: #f5f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    .lab {
      width: min(460px, 100%);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .lab-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #aeb5c0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .lab-header img {
      width: 72px;
      height: auto;
    }

    .card {
      position: relative;
      width: min(430px, 94vw);
      aspect-ratio: 1500 / 2100;
      overflow: hidden;
      background: #dfe4e8;
      border-radius: 9px;
      box-shadow: 0 24px 54px rgba(0, 0, 0, 0.55);
      isolation: isolate;
    }

    .photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, 0.16) 78%, rgba(0, 0, 0, 0.48) 100%),
        url("./mockup-assets/milton-bradley-2005.jpg") center 16% / cover no-repeat;
      filter: saturate(0.94) contrast(1.04);
    }

    .frame {
      position: absolute;
      z-index: 3;
      left: -4.8%;
      top: -3.43%;
      width: 109.6%;
      height: 106.86%;
      object-fit: fill;
      pointer-events: none;
    }

    .onbase-number {
      position: absolute;
      z-index: 6;
      left: 10.23%;
      top: 77.38%;
      color: #ef3d1b;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(21px, 6.5vw, 29px);
      font-style: normal;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      text-shadow:
        -1px -1px 0 #080808,
        1px -1px 0 #080808,
        -1px 1px 0 #080808,
        1px 1px 0 #080808;
      pointer-events: none;
    }

    .team-logo {
      position: absolute;
      z-index: 5;
      left: 79.33%;
      top: 70.48%;
      width: 13.33%;
      height: 9.52%;
      object-fit: contain;
      filter: drop-shadow(0 2px 1px rgba(0, 0, 0, 0.7));
    }

    .player-name {
      position: absolute;
      z-index: 6;
      left: 18.4%;
      top: 75.57%;
      width: 59.33%;
      height: 5%;
      display: flex;
      align-items: center;
      overflow: hidden;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(20px, 5.4vw, 31px);
      font-style: normal;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.88);
    }

    .metadata {
      position: absolute;
      z-index: 6;
      left: 18.8%;
      right: 17.4%;
      top: 81.43%;
      height: 3.1%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.55vw, 14px);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 2px #000;
      transform: translateY(-10%);
    }

    .ranges {
      position: absolute;
      z-index: 6;
      left: 0;
      right: 0;
      top: 84.72%;
      height: 3.55%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.7vw, 15px);
      font-style: normal;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 2px #000;
      transform: translateY(-10%);
    }

    .ranges span {
      position: absolute;
      left: var(--range-x);
      top: 50%;
      transform: translate(-50%, -50%);
    }

    .set-year {
      position: absolute;
      z-index: 6;
      right: 4.1%;
      top: 91.05%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.45vw, 14px);
      line-height: 1;
      text-shadow: 0 2px 2px #000;
    }

    .note {
      margin: 0;
      color: #aeb5c0;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 380px) {
      .player-name {
        font-size: 21px;
      }

      .metadata {
        font-size: 9px;
      }

      .ranges {
        font-size: 8px;
      }
    }
  </style>
</head>
<body>
  <main class="lab">
    <header class="lab-header">
      <span>2005 renderer prototype</span>
      <img src="./vendor/showdownbot/set-2005-v2.png" alt="2005">
    </header>

    <article class="card" aria-label="Milton Bradley 2005 Showdown-style card">
      <div class="photo"></div>

      <img class="frame" src="./vendor/showdownbot/2004-Hitter-BLUE.png" alt="">
      <div class="onbase-number">10</div>
      <img class="team-logo" src="./vendor/showdownbot/LAD.png" alt="Los Angeles Dodgers">

      <div class="player-name">Milton Bradley</div>

      <div class="metadata" aria-label="Player metadata">
        <span>180 PT</span>
        <span>Speed 15</span>
        <span>Bats S</span>
        <span>CF +1</span>
      </div>

      <div class="ranges" aria-label="Chart result ranges">
        <span style="--range-x: 8.13%">1-2</span>
        <span style="--range-x: 18.53%">3-4</span>
        <span style="--range-x: 28.93%">5-6</span>
        <span style="--range-x: 39.33%">7-10</span>
        <span style="--range-x: 49.73%">11-16</span>
        <span style="--range-x: 60.13%">17</span>
        <span style="--range-x: 70.53%">18-19</span>
        <span style="--range-x: 80.93%">-</span>
        <span style="--range-x: 91.33%">20+</span>
      </div>

      <div class="set-year">2005</div>
    </article>

    <p class="note">
      This version uses ShowdownBot's actual 2004/2005 frame, fonts, logo, and renderer coordinates. The player photo is still the existing unprocessed mockup image.
    </p>
  </main>
</body>
</html>
