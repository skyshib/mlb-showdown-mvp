<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ShowdownBot 2005 Card Prototype</title>
  <style>
    @font-face {
      font-family: "Showdown Condensed";
      src: url("./vendor/showdownbot/HelveticaNeueCondensedBold.ttf") format("truetype");
      font-weight: 700;
      font-display: swap;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px 16px 36px;
      background: #17191d;
      color: #f5f7fa;
      font-family: Arial, Helvetica, sans-serif;
    }

    .lab {
      width: min(460px, 100%);
      display: grid;
      gap: 14px;
      justify-items: center;
    }

    .lab-header {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: #aeb5c0;
      font-size: 12px;
      text-transform: uppercase;
    }

    .lab-header img {
      width: 72px;
      height: auto;
    }

    .rarity-picker {
      width: min(430px, 94vw);
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 5px;
    }

    .rarity-choice {
      min-width: 0;
      height: 45px;
      display: grid;
      grid-template-columns: 18px minmax(0, 1fr);
      align-items: center;
      justify-content: center;
      gap: 4px;
      padding: 0 6px;
      border: 1px solid #3c414a;
      border-radius: 6px;
      background: #22252a;
      color: #cbd0d8;
      font: 700 10px/1 Arial, Helvetica, sans-serif;
      text-transform: uppercase;
      cursor: pointer;
    }

    .rarity-choice:hover {
      border-color: #6e7682;
      color: #fff;
    }

    .rarity-choice[aria-pressed="true"] {
      border-color: #f0f2f5;
      background: #30343b;
      color: #fff;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.16);
    }

    .picker-symbol {
      display: grid;
      place-items: center;
      width: 18px;
      aspect-ratio: 1;
      border-radius: 50%;
      color: var(--picker-color, #68727d);
      font-size: 15px;
      line-height: 1;
    }

    .picker-symbol.rarity-common { --picker-color: #7d8792; }
    .picker-symbol.rarity-bronze { --picker-color: #bd8250; }
    .picker-symbol.rarity-silver { --picker-color: #dce4e9; }
    .picker-symbol.rarity-gold { --picker-color: #f0c95e; }
    .picker-symbol.rarity-legendary { --picker-color: #ffe987; }

    .rarity-frame {
      --rarity-color: #9c6a3f;
      --rarity-glow: rgba(156, 106, 63, 0.32);
      width: min(430px, 94vw);
      padding: 4px;
      border-radius: 13px;
      background: var(--rarity-color);
      box-shadow:
        0 24px 54px rgba(0, 0, 0, 0.55),
        0 0 22px var(--rarity-glow);
    }

    .rarity-frame.rarity-silver {
      --rarity-color: #c9d2d8;
      --rarity-glow: rgba(152, 186, 205, 0.36);
    }

    .rarity-frame.rarity-common {
      --rarity-color: #68727d;
      --rarity-glow: rgba(104, 114, 125, 0.2);
    }

    .rarity-frame.rarity-bronze {
      --rarity-color: #9c6a3f;
      --rarity-glow: rgba(156, 106, 63, 0.32);
    }

    .rarity-frame.rarity-gold {
      --rarity-color: #e1b64b;
      --rarity-glow: rgba(221, 173, 57, 0.42);
    }

    .rarity-frame.rarity-rainbow,
    .rarity-frame.rarity-legendary {
      --rarity-color: conic-gradient(from 40deg, #ff6279, #ffd15e, #53d69e, #4f9dff, #c27cff, #ff6279);
      --rarity-glow: rgba(120, 180, 255, 0.52);
      padding: 6px;
      border-radius: 15px;
    }

    .rarity-mark {
      --mark-ring: #68727d;
      position: absolute;
      z-index: 8;
      top: 2.2%;
      right: 3.1%;
      width: 9%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle, #17191d 0 58%, transparent 61%),
        var(--mark-ring);
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      font-size: clamp(14px, 4vw, 20px);
      font-weight: 700;
      line-height: 1;
      text-shadow: 0 1px 2px #000;
      box-shadow: 0 2px 7px rgba(0, 0, 0, 0.62);
    }

    .rarity-mark::before,
    .picker-symbol::before { content: "\2022"; }
    .rarity-mark.rarity-common::before,
    .picker-symbol.rarity-common::before { content: "\2022"; }
    .rarity-mark.rarity-bronze::before,
    .picker-symbol.rarity-bronze::before {
      content: "\25C6";
      transform: translateY(1px);
    }
    .rarity-mark.rarity-silver::before,
    .picker-symbol.rarity-silver::before {
      content: "\2B22";
      transform: translateY(1px);
    }
    .rarity-mark.rarity-gold::before,
    .picker-symbol.rarity-gold::before { content: "\2605"; }
    .rarity-mark.rarity-legendary::before,
    .picker-symbol.rarity-legendary::before { content: "\2726"; }

    .rarity-mark.rarity-common { --mark-ring: #68727d; }
    .rarity-mark.rarity-bronze { --mark-ring: #9c6a3f; }
    .rarity-mark.rarity-silver { --mark-ring: #c9d2d8; }
    .rarity-mark.rarity-gold { --mark-ring: #e1b64b; }
    .rarity-mark.rarity-legendary {
      --mark-ring: conic-gradient(from 40deg, #ff6279, #ffd15e, #53d69e, #4f9dff, #c27cff, #ff6279);
      color: #ffe987;
    }

    .card {
      position: relative;
      width: 100%;
      aspect-ratio: 1500 / 2100;
      overflow: hidden;
      background: #dfe4e8;
      border-radius: 9px;
      isolation: isolate;
      --bb-color: #c99127;
      --single-color: #34785d;
      --double-color: #286f9b;
      --triple-color: #735394;
      --homer-color: #a93443;
    }

    .photo {
      position: absolute;
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(180deg, #8099ae 0 58%, #193725 58% 64%, #49734d 64% 100%);
      filter: saturate(0.94) contrast(1.04);
    }

    .photo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center bottom;
      transform: scale(1.08);
      transform-origin: center bottom;
    }

    .photo::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 58%, rgba(0, 0, 0, 0.12) 78%, rgba(0, 0, 0, 0.42) 100%);
      pointer-events: none;
    }

    .frame {
      position: absolute;
      z-index: 3;
      left: -4.8%;
      top: -3.43%;
      width: 109.6%;
      height: 106.86%;
      object-fit: fill;
      pointer-events: none;
    }

    .onbase-number {
      position: absolute;
      z-index: 6;
      left: 10.23%;
      top: 86.38%;
      color: #ef3d1b;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(21px, 6.5vw, 29px);
      font-style: normal;
      font-weight: 700;
      line-height: 1;
      transform: translate(-50%, -50%);
      text-shadow:
        -1px -1px 0 #080808,
        1px -1px 0 #080808,
        -1px 1px 0 #080808,
        1px 1px 0 #080808;
      pointer-events: none;
    }

    .team-logo {
      position: absolute;
      z-index: 5;
      left: 79.33%;
      top: 79.48%;
      width: 13.33%;
      height: 9.52%;
      object-fit: contain;
      filter: drop-shadow(0 2px 1px rgba(0, 0, 0, 0.7));
    }

    .fictional-logo {
      display: grid;
      place-items: center;
      border: 3px solid #fff;
      border-radius: 50%;
      background: #b6242c;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(15px, 4vw, 23px);
      line-height: 1;
      box-shadow: inset 0 0 0 3px #193d6b;
    }

    .player-name {
      position: absolute;
      z-index: 6;
      left: 18.4%;
      top: 84.57%;
      width: 59.33%;
      height: 5%;
      display: flex;
      align-items: center;
      overflow: hidden;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(20px, 5.4vw, 31px);
      font-style: normal;
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 2px 2px rgba(0, 0, 0, 0.88);
    }

    .metadata {
      position: absolute;
      z-index: 6;
      left: 18.8%;
      right: 17.4%;
      top: 90.43%;
      height: 3.1%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 2%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-size: clamp(10px, 2.55vw, 14px);
      line-height: 1;
      text-transform: uppercase;
      white-space: nowrap;
      text-shadow: 0 1px 2px #000;
      transform: translateY(-10%);
    }

    .chart-strip {
      position: absolute;
      z-index: 6;
      left: 0;
      right: 0;
      top: 93.35%;
      height: 6.65%;
      display: grid;
      grid-template-rows: 3.55fr 3.1fr;
      background: rgb(9, 41, 64);
      border-top: 1px solid rgba(0, 0, 0, 0.72);
      border-bottom: 1px solid rgba(0, 0, 0, 0.72);
      box-shadow:
        inset 0 1px 0 rgba(255, 255, 255, 0.14),
        inset 0 -1px 0 rgba(255, 255, 255, 0.08);
    }

    .chart-ranges,
    .chart-outcomes {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      align-items: center;
      padding: 0 2.45%;
      color: #fff;
      font-family: "Showdown Condensed", Arial Narrow, sans-serif;
      font-style: normal;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      text-shadow: 0 2px 2px #000;
    }

    .chart-ranges {
      font-size: clamp(10px, 2.7vw, 15px);
      transform: translateY(-1px);
    }

    .chart-outcomes {
      border-top: 1px solid rgba(0, 0, 0, 0.7);
      font-size: clamp(11px, 2.9vw, 16px);
    }

    .chart-ranges span,
    .chart-outcomes span {
      height: 100%;
      display: grid;
      place-items: center;
    }

    .chart-ranges span:nth-child(4),
    .chart-outcomes span:nth-child(4) { background: color-mix(in srgb, var(--bb-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(5),
    .chart-outcomes span:nth-child(5) { background: color-mix(in srgb, var(--single-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(6),
    .chart-outcomes span:nth-child(6) { background: color-mix(in srgb, var(--double-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(7),
    .chart-outcomes span:nth-child(7) { background: color-mix(in srgb, var(--triple-color) 82%, rgb(9, 41, 64)); }
    .chart-ranges span:nth-child(8),
    .chart-outcomes span:nth-child(8) { background: color-mix(in srgb, var(--homer-color) 82%, rgb(9, 41, 64)); }

    .note {
      margin: 0;
      color: #aeb5c0;
      font-size: 12px;
      line-height: 1.4;
      text-align: center;
    }

    @media (max-width: 460px) {
      .rarity-choice {
        grid-template-columns: 1fr;
        gap: 2px;
        padding: 0 2px;
        font-size: 8px;
      }

      .picker-symbol {
        width: 15px;
        margin: 0 auto;
        font-size: 13px;
      }
    }

    @media (max-width: 380px) {
      .player-name {
        font-size: 21px;
      }

      .metadata {
        font-size: 9px;
      }

      .chart-ranges {
        font-size: 9px;
      }

      .chart-outcomes {
        font-size: 10px;
      }
    }
  </style>
</head>
<body>
  <main class="lab">
    <header class="lab-header">
      <span>Fictional card test</span>
    </header>

    <div class="rarity-picker" aria-label="Preview rarity">
      <button class="rarity-choice" type="button" data-rarity="common" aria-pressed="false">
        <span class="picker-symbol rarity-common" aria-hidden="true"></span><span>Common</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="bronze" aria-pressed="false">
        <span class="picker-symbol rarity-bronze" aria-hidden="true"></span><span>Bronze</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="silver" aria-pressed="false">
        <span class="picker-symbol rarity-silver" aria-hidden="true"></span><span>Silver</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="gold" aria-pressed="false">
        <span class="picker-symbol rarity-gold" aria-hidden="true"></span><span>Gold</span>
      </button>
      <button class="rarity-choice" type="button" data-rarity="legendary" aria-pressed="true">
        <span class="picker-symbol rarity-legendary" aria-hidden="true"></span><span>Legendary</span>
      </button>
    </div>

    <div class="rarity-frame rarity-legendary" aria-label="Legendary rarity">
    <article class="card" aria-label="Serena Anwar Showdown-style card">
      <span class="rarity-mark rarity-legendary" aria-label="Legendary rarity" title="Legendary"></span>
      <div class="photo">
        <img
          src="https://api.dicebear.com/9.x/micah/svg?seed=Serena%20Anwar-hitter-LF%2FRF&amp;backgroundColor=transparent"
          alt="Fictional portrait of Serena Anwar"
          referrerpolicy="no-referrer"
        >
      </div>

      <img class="frame" src="./vendor/showdownbot/2004-Hitter-BLUE-NO-FOOTER.png" alt="">
      <div class="onbase-number">13</div>
      <div class="team-logo fictional-logo" aria-label="Austin Comets">AC</div>

      <div class="player-name">Serena Anwar</div>

      <div class="metadata" aria-label="Player metadata">
        <span>412 PT</span>
        <span>Speed 19</span>
        <span>Bats L</span>
        <span>LF/RF +2</span>
      </div>

      <div class="chart-strip" aria-label="Batting chart">
        <div class="chart-ranges" aria-label="Chart result ranges">
          <span>1-3</span>
          <span>4</span>
          <span>5</span>
          <span>6-8</span>
          <span>9-13</span>
          <span>14</span>
          <span>15</span>
          <span>16-20</span>
        </div>
        <div class="chart-outcomes" aria-label="Chart outcomes">
          <span>SO</span>
          <span>GB</span>
          <span>FB</span>
          <span>BB</span>
          <span>1B</span>
          <span>2B</span>
          <span>3B</span>
          <span>HR</span>
        </div>
      </div>
    </article>
    </div>

    <p class="note">
      Fictional player and club using DiceBear's Micah portrait style.
    </p>
  </main>
  <script>
    const rarityTiers = ["common", "bronze", "silver", "gold", "legendary"];
    const rarityFrame = document.querySelector(".rarity-frame");
    const rarityMark = document.querySelector(".rarity-mark");
    const rarityChoices = document.querySelectorAll(".rarity-choice");

    function previewRarity(tier) {
      const rarityClasses = rarityTiers.map((name) => `rarity-${name}`);
      rarityFrame.classList.remove(...rarityClasses);
      rarityMark.classList.remove(...rarityClasses);
      rarityFrame.classList.add(`rarity-${tier}`);
      rarityMark.classList.add(`rarity-${tier}`);

      const label = tier[0].toUpperCase() + tier.slice(1);
      rarityFrame.setAttribute("aria-label", `${label} rarity`);
      rarityMark.setAttribute("aria-label", `${label} rarity`);
      rarityMark.title = label;
      rarityChoices.forEach((choice) => {
        choice.setAttribute("aria-pressed", String(choice.dataset.rarity === tier));
      });
    }

    rarityChoices.forEach((choice) => {
      choice.addEventListener("click", () => previewRarity(choice.dataset.rarity));
    });
  </script>
</body>
</html>
